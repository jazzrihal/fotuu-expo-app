name: Unit Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "modules/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "jest.setup.ts"
      - ".github/workflows/unit-tests.yml"

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run test:ci
