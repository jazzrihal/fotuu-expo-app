name: Compile iOS E2E App

on:
  push:
    branches:
      - main
      - "cursor/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-ios-compile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-ios-e2e:
    name: Compile iOS E2E app
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_SUPABASE_LOCAL_URL: "http://127.0.0.1:54321"
      EXPO_PUBLIC_SUPABASE_LOCAL_PUBLISHABLE_KEY: "sb_publishable_ci_placeholder"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.x"
          cache: npm

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Compile E2E iOS app
        run: npm run build:e2e:ios
