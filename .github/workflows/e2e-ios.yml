name: iOS E2E

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ios-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compile-ios-e2e:
    name: Compile iOS E2E app
    uses: ./.github/workflows/e2e-ios-compile.yml
    permissions:
      contents: read

  run-ios-e2e:
    name: Run iOS Maestro E2E
    runs-on: macos-26
    timeout-minutes: 30
    needs: compile-ios-e2e
    env:
      CI: "true"
      MAESTRO_DRIVER_STARTUP_TIMEOUT: "120000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.x"
          cache: npm

      - name: Download E2E iOS app artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-e2e-app
          path: artifacts

      - name: Unpack E2E iOS app
        run: |
          set -euo pipefail
          mkdir -p build
          tar -xzf artifacts/ios-e2e-app.tar.gz -C build
          APP_PATH="$(python3 <<'PY'
          from pathlib import Path

          apps = sorted(path for path in Path("build/ios-e2e").rglob("*.app") if path.is_dir())
          if not apps:
            raise SystemExit("No .app bundle found in downloaded iOS E2E artifact")
          print(apps[0])
          PY
          )"
          echo "Using app bundle: ${APP_PATH}"
          {
            echo "APP_PATH<<EOF"
            echo "${APP_PATH}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Install Maestro
        run: |
          set -euo pipefail
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Create and boot iOS simulator
        run: |
          set -euo pipefail
          RUNTIME_ID="$(python3 <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "available", "-j"]))
          runtimes = [
            runtime for runtime in data["runtimes"]
            if runtime.get("platform") == "iOS" and runtime.get("isAvailable", False)
          ]
          if not runtimes:
            raise SystemExit("No available iOS simulator runtimes found")
          runtimes.sort(key=lambda runtime: tuple(int(part) for part in runtime["version"].split(".")), reverse=True)
          print(runtimes[0]["identifier"])
          PY
          )"
          DEVICE_TYPE_ID="$(python3 <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"]))
          devices = [
            device for device in data["devicetypes"]
            if device["name"].startswith("iPhone") and "Max" not in device["name"]
          ]
          if not devices:
            raise SystemExit("No iPhone simulator device types found")
          print(devices[-1]["identifier"])
          PY
          )"
          SIMULATOR_UDID="$(xcrun simctl create "Fotuu E2E iPhone" "${DEVICE_TYPE_ID}" "${RUNTIME_ID}")"
          echo "SIMULATOR_UDID=${SIMULATOR_UDID}" >> "${GITHUB_ENV}"
          xcrun simctl boot "${SIMULATOR_UDID}"
          xcrun simctl bootstatus "${SIMULATOR_UDID}" -b

      - name: Install app on simulator
        run: |
          set -euo pipefail
          xcrun simctl install "${SIMULATOR_UDID}" "${APP_PATH}"

      - name: Run Maestro E2E suite
        run: npm run test:e2e

      - name: Delete iOS simulator
        if: always() && env.SIMULATOR_UDID != ''
        run: |
          xcrun simctl shutdown "${SIMULATOR_UDID}" || true
          xcrun simctl delete "${SIMULATOR_UDID}" || true
