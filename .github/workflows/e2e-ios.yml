name: iOS E2E

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: ios-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve-ios-e2e-app:
    name: Resolve iOS E2E app artifact
    runs-on: ubuntu-latest
    outputs:
      should_compile: ${{ steps.resolve.outputs.should_compile }}
      artifact_run_id: ${{ steps.resolve.outputs.artifact_run_id }}
      artifact_source_sha: ${{ steps.resolve.outputs.artifact_source_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Resolve reusable E2E app artifact
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.event.pull_request.head.sha }}
          CURRENT_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          artifact_json="$(
            gh api "repos/${REPOSITORY}/actions/artifacts?name=ios-e2e-app&per_page=100" \
              --jq '.artifacts
                | map(select(.expired == false))
                | map(select(.workflow_run.head_branch == env.CURRENT_BRANCH))
                | map(select((.workflow_run.id | tostring) != env.GITHUB_RUN_ID))
                | sort_by(.created_at)
                | reverse
                | .[0] // empty'
          )"

          if [ -z "${artifact_json}" ]; then
            echo "No previous ios-e2e-app artifact found for ${CURRENT_BRANCH}; compiling."
            {
              echo "should_compile=true"
              echo "artifact_run_id="
              echo "artifact_source_sha="
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          artifact_run_id="$(jq -r '.workflow_run.id' <<< "${artifact_json}")"
          artifact_source_sha="$(jq -r '.workflow_run.head_sha' <<< "${artifact_json}")"

          if ! git cat-file -e "${artifact_source_sha}^{commit}" 2>/dev/null; then
            echo "Previous artifact source ${artifact_source_sha} is not available locally; compiling."
            {
              echo "should_compile=true"
              echo "artifact_run_id=${artifact_run_id}"
              echo "artifact_source_sha=${artifact_source_sha}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_files="$(
            git diff --name-only "${artifact_source_sha}" "${CURRENT_SHA}" -- \
              .github/workflows/e2e-ios-compile.yml \
              app \
              app.config.js \
              app.config.ts \
              app.json \
              assets \
              babel.config.js \
              babel.config.json \
              index.js \
              ios \
              metro.config.js \
              metro.config.json \
              package-lock.json \
              package.json \
              src \
              tsconfig.json
          )"

          if [ -n "${changed_files}" ]; then
            echo "App/build inputs changed since artifact ${artifact_run_id}; compiling."
            printf '%s\n' "${changed_files}"
            should_compile=true
          else
            echo "Reusing ios-e2e-app artifact ${artifact_run_id} from ${artifact_source_sha}."
            should_compile=false
          fi

          {
            echo "should_compile=${should_compile}"
            echo "artifact_run_id=${artifact_run_id}"
            echo "artifact_source_sha=${artifact_source_sha}"
          } >> "${GITHUB_OUTPUT}"

  compile-ios-e2e:
    name: Compile iOS E2E app
    needs: resolve-ios-e2e-app
    if: needs.resolve-ios-e2e-app.outputs.should_compile == 'true'
    uses: ./.github/workflows/e2e-ios-compile.yml
    permissions:
      contents: read
      actions: read
    secrets:
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}

  run-ios-e2e:
    name: Run iOS Maestro E2E
    runs-on: macos-26
    timeout-minutes: 30
    needs:
      - resolve-ios-e2e-app
      - compile-ios-e2e
    if: always() && needs.resolve-ios-e2e-app.result == 'success' && (needs.resolve-ios-e2e-app.outputs.should_compile == 'false' || needs.compile-ios-e2e.result == 'success')
    concurrency:
      group: ios-e2e-remote-test-db
      cancel-in-progress: false
    env:
      CI: "true"
      MAESTRO_DRIVER_STARTUP_TIMEOUT: "120000"
      E2E_EMAIL: "alice@example.com"
      E2E_PASSWORD: "fotuu-local-dev"
      E2E_SIGN_UP_EMAIL: "e2e-new@fotuu.com"
      E2E_SIGN_UP_PASSWORD: "Password123!"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download newly compiled E2E iOS app artifact
        if: needs.resolve-ios-e2e-app.outputs.should_compile == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ios-e2e-app
          path: artifacts

      - name: Download reused E2E iOS app artifact
        if: needs.resolve-ios-e2e-app.outputs.should_compile == 'false'
        uses: actions/download-artifact@v4
        with:
          name: ios-e2e-app
          path: artifacts
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.resolve-ios-e2e-app.outputs.artifact_run_id }}

      - name: Unpack E2E iOS app
        run: |
          set -euo pipefail
          mkdir -p build
          tar -xzf artifacts/ios-e2e-app.tar.gz -C build
          APP_PATH="$(python3 <<'PY'
          from pathlib import Path

          apps = sorted(path for path in Path("build/ios-e2e").rglob("*.app") if path.is_dir())
          if not apps:
            raise SystemExit("No .app bundle found in downloaded iOS E2E artifact")
          print(apps[0])
          PY
          )"
          echo "Using app bundle: ${APP_PATH}"
          {
            echo "APP_PATH<<EOF"
            echo "${APP_PATH}"
            echo "EOF"
          } >> "${GITHUB_ENV}"

      - name: Install Maestro
        run: |
          set -euo pipefail
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Validate Supabase reset configuration
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.E2E_SUPABASE_DB_PASSWORD }}
          E2E_SUPABASE_PROJECT_REF: ${{ secrets.E2E_SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          missing=()
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD E2E_SUPABASE_PROJECT_REF; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Supabase reset configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Check out Supabase backend
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.E2E_SUPABASE_BACKEND_REPOSITORY || 'jazzrihal/fotuu-supabase-backend' }}
          path: supabase-backend
          token: ${{ secrets.E2E_SUPABASE_BACKEND_TOKEN || github.token }}

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.104.0

      - name: Reset E2E Supabase database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.E2E_SUPABASE_DB_PASSWORD }}
          E2E_SUPABASE_PROJECT_REF: ${{ secrets.E2E_SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          supabase --workdir supabase-backend link \
            --project-ref "${E2E_SUPABASE_PROJECT_REF}" \
            --password "${SUPABASE_DB_PASSWORD}"
          supabase --workdir supabase-backend db reset --linked --yes

      - name: Verify seeded Supabase Auth user
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { createClient } = require('@supabase/supabase-js');

          const required = [
            'E2E_SUPABASE_URL',
            'E2E_SUPABASE_PUBLISHABLE_KEY',
            'E2E_EMAIL',
            'E2E_PASSWORD',
          ];
          const missing = required.filter((name) => !process.env[name]);
          if (missing.length > 0) {
            throw new Error(`Missing required environment variables: ${missing.join(', ')}`);
          }

          async function main() {
            const supabase = createClient(
              process.env.E2E_SUPABASE_URL,
              process.env.E2E_SUPABASE_PUBLISHABLE_KEY,
              {
                auth: {
                  autoRefreshToken: false,
                  persistSession: false,
                },
              },
            );

            const { error } = await supabase.auth.signInWithPassword({
              email: process.env.E2E_EMAIL,
              password: process.env.E2E_PASSWORD,
            });
            if (error) throw error;

            await supabase.auth.signOut();
            console.log(`Verified seeded Supabase Auth user ${process.env.E2E_EMAIL}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Create and boot iOS simulator
        run: |
          set -euo pipefail
          RUNTIME_ID="$(python3 <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "available", "-j"]))
          runtimes = [
            runtime for runtime in data["runtimes"]
            if runtime.get("platform") == "iOS" and runtime.get("isAvailable", False)
          ]
          if not runtimes:
            raise SystemExit("No available iOS simulator runtimes found")
          runtimes.sort(key=lambda runtime: tuple(int(part) for part in runtime["version"].split(".")), reverse=True)
          print(runtimes[0]["identifier"])
          PY
          )"
          DEVICE_TYPE_ID="$(python3 <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"]))
          devices = [
            device for device in data["devicetypes"]
            if device["name"].startswith("iPhone") and "Max" not in device["name"]
          ]
          if not devices:
            raise SystemExit("No iPhone simulator device types found")
          print(devices[-1]["identifier"])
          PY
          )"
          SIMULATOR_UDID="$(xcrun simctl create "Fotuu E2E iPhone" "${DEVICE_TYPE_ID}" "${RUNTIME_ID}")"
          echo "SIMULATOR_UDID=${SIMULATOR_UDID}" >> "${GITHUB_ENV}"
          xcrun simctl boot "${SIMULATOR_UDID}"
          xcrun simctl bootstatus "${SIMULATOR_UDID}" -b

      - name: Install app on simulator
        run: |
          set -euo pipefail
          xcrun simctl install "${SIMULATOR_UDID}" "${APP_PATH}"

      - name: Run Maestro E2E suite
        run: npm run test:e2e

      - name: Delete iOS simulator
        if: always() && env.SIMULATOR_UDID != ''
        run: |
          xcrun simctl shutdown "${SIMULATOR_UDID}" || true
          xcrun simctl delete "${SIMULATOR_UDID}" || true
