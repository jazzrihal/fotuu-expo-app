appId: com.jazzrihal.Fotuu
env:
  E2E_EMAIL: ${E2E_EMAIL || "alice@example.com"}
  E2E_PASSWORD: ${E2E_PASSWORD || "fotuu-local-dev"}
---
- runFlow:
    file: ../auth/sign-in.yaml
    env:
      E2E_EMAIL: ${E2E_EMAIL}
      E2E_PASSWORD: ${E2E_PASSWORD}
- tapOn: "Friends"
- tapOn: "Feed"
- runFlow:
    when:
      visible:
        id: "friends-feed-grid"
    commands:
      - assertVisible:
          id: "friends-feed-grid"
- runFlow:
    when:
      visible:
        id: "friends-feed-empty"
    commands:
      - assertVisible:
          id: "friends-feed-empty"
