appId: com.jazzrihal.Fotuu
env:
  E2E_EMAIL: ${E2E_EMAIL || "alice@example.com"}
  E2E_PASSWORD: ${E2E_PASSWORD || "fotuu-local-dev"}
---
- runFlow:
    file: ../auth/sign-in.yaml
    env:
      E2E_EMAIL: ${E2E_EMAIL}
      E2E_PASSWORD: ${E2E_PASSWORD}
- tapOn: "Friends"
- tapOn: "Feed"
- runFlow:
    when:
      visible:
        id: "friends-feed"
    commands:
      - assertVisible:
          id: "friends-feed"
      - scrollUntilVisible:
          element:
            id: "friends-feed-section-bob-row-0"
          direction: DOWN
      - assertVisible:
          id: "friends-feed-section-bob-row-0"
      - scrollUntilVisible:
          element:
            id: "friends-feed-section-bob-row-1"
          direction: DOWN
      - assertVisible:
          id: "friends-feed-section-bob-row-1"
      - tapOn:
          id: "friends-feed-section-bob-row-1"
      - assertVisible:
          id: "friends-post-feed-pager"
      - assertVisible:
          id: "friends-post-detail"
      - swipe:
          direction: UP
          from:
            id: "friends-post-feed-pager"
- runFlow:
    when:
      visible:
        id: "friends-feed-empty"
    commands:
      - assertVisible:
          id: "friends-feed-empty"
