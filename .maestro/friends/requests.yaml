appId: com.jazzrihal.Fotuu
env:
  E2E_EMAIL: ${E2E_EMAIL || "eve@example.com"}
  E2E_PASSWORD: ${E2E_PASSWORD || "fotuu-local-dev"}
---
- runFlow:
    file: ../auth/sign-in.yaml
    env:
      E2E_EMAIL: ${E2E_EMAIL}
      E2E_PASSWORD: ${E2E_PASSWORD}
- tapOn: "Friends"
- tapOn:
    id: "friends-list-button"
- assertVisible:
    id: "friends-requests-pending"
- assertVisible:
    id: "incoming-request-diana"
