appId: com.jazzrihal.Fotuu
env:
  E2E_EMAIL: ${E2E_EMAIL || "alice@example.com"}
  E2E_PASSWORD: ${E2E_PASSWORD || "fotuu-local-dev"}
---
- runFlow:
    file: ../auth/sign-in.yaml
    env:
      E2E_EMAIL: ${E2E_EMAIL}
      E2E_PASSWORD: ${E2E_PASSWORD}
- tapOn: "Friends"
- assertVisible:
    id: "friend-row-bob"
- swipe:
    start: "50%,50%"
    end: "10%,50%"
    duration: 300
- tapOn: "Remove"
- assertNotVisible:
    id: "friend-row-bob"
