appId: com.jazzrihal.Fotuu
# Matches fotuu-supabase-backend supabase/seed.sql (survives `supabase db reset`)
env:
  E2E_EMAIL: "alice@example.com"
  E2E_PASSWORD: "fotuu-local-dev"
flows:
  - "auth/*"
executionOrder:
  continueOnFailure: false
  flowsOrder:
    - sign-in
    - sign-in-validation
    - sign-out
    - sign-up
