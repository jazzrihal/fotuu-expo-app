appId: com.jazzrihal.Fotuu
flows:
  - "auth/*"
  - "friends/*"
  - "posts/*"
  - "profile/*"
executionOrder:
  continueOnFailure: false
  flowsOrder:
    - sign-in
    - sign-in-validation
    - sign-out
    - sign-up
    - view-profile
    - view-profile-post-detail
    - list
    - search
    - requests
    - create-post
    - view-post-detail
