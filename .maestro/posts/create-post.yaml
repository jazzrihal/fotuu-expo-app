appId: com.jazzrihal.Fotuu
env:
  E2E_EMAIL: ${E2E_EMAIL || "alice@example.com"}
  E2E_PASSWORD: ${E2E_PASSWORD || "fotuu-local-dev"}
  E2E_POST_CAPTION: ${E2E_POST_CAPTION || "Golden hour from Maestro"}
---
- runFlow:
    file: ../auth/sign-in.yaml
    env:
      E2E_EMAIL: ${E2E_EMAIL}
      E2E_PASSWORD: ${E2E_PASSWORD}
- tapOn: "Home"
- assertVisible:
    id: "home-feed"
- tapOn: "New post"
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- tapOn:
    id: "camera-shutter-button"
- assertVisible:
    id: "new-post-preview"
- assertVisible:
    id: "new-post-captured-at"
- tapOn:
    id: "new-post-caption"
- inputText: ${E2E_POST_CAPTION}
- tapOn: "Post"
- assertVisible:
    id: "home-feed-grid"
