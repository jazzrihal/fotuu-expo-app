appId: com.jazzrihal.Fotuu
---
- launchApp:
    clearState: true

# Empty fields — should show validation error
- tapOn:
    id: "sign-in-button"
- assertVisible:
    id: "sign-in-error"

# Wrong password — should show Supabase error
- tapOn:
    id: "sign-in-email"
- inputText: ${E2E_EMAIL}
- tapOn:
    id: "sign-in-password"
- inputText: "wrongpassword"
- tapOn:
    id: "sign-in-button"
- assertVisible:
    id: "sign-in-error"
