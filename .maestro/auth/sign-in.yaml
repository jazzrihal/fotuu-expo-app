appId: com.jazzrihal.Fotuu
# fotuu-supabase-backend supabase/seed.sql — survives `supabase db reset`
env:
  E2E_EMAIL: ${E2E_EMAIL || "alice@example.com"}
  E2E_PASSWORD: ${E2E_PASSWORD || "fotuu-local-dev"}
---
- launchApp:
    clearState: true
- assertVisible:
    id: "sign-in-email"
- tapOn:
    id: "sign-in-email"
- inputText: ${E2E_EMAIL}
- tapOn:
    id: "sign-in-password"
- inputText: ${E2E_PASSWORD}
- tapOn:
    id: "sign-in-button"
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- assertVisible:
    id: "home-user-email"
