appId: com.jazzrihal.Fotuu
env:
  EMAIL: "e2e@fotuu.com"
  PASSWORD: "Password123!"
---
- launchApp:
    clearState: true
- assertVisible:
    id: "sign-in-email"
- tapOn:
    id: "sign-in-email"
- inputText: ${EMAIL}
- tapOn:
    id: "sign-in-password"
- inputText: ${PASSWORD}
- tapOn:
    id: "sign-in-button"
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- assertVisible:
    id: "home-user-email"
