appId: com.jazzrihal.Fotuu
---
- launchApp:
    clearState: true
- assertVisible:
    id: "sign-in-email"
- tapOn:
    id: "sign-in-email"
- inputText: ${E2E_EMAIL}
- tapOn:
    id: "sign-in-password"
- inputText: ${E2E_PASSWORD}
- tapOn:
    id: "sign-in-button"
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
- assertVisible:
    id: "home-user-email"
